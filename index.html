<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="C.Sole — Personal Guitar Recordings">
  <title>C.Sole</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">

  <link rel="stylesheet" href="css/style.css">
  <script src="js/main.js" defer></script>
</head>
<body>

  <!-- Notes Rain Background -->
  <canvas id="notes-rain" aria-hidden="true"></canvas>

  <!-- ─── Hero (full viewport) ─── -->
  <section class="hero" aria-label="Welcome">
    <div class="hero-content">
      <h1 class="hero-logo">C.Sole</h1>
      <p class="hero-subtitle">welcome to Jaijai's sole world</p>
      <div class="hero-cover" id="hero-guitar">
        <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="100" cy="100" r="96" stroke="currentColor" stroke-width="1" opacity="0.12"/>
          <circle cx="100" cy="100" r="80" stroke="currentColor" stroke-width="0.5" opacity="0.06"/>
          <ellipse cx="100" cy="138" rx="42" ry="34" stroke="currentColor" stroke-width="2.5" opacity="0.7"/>
          <ellipse cx="100" cy="106" rx="30" ry="24" stroke="currentColor" stroke-width="2.5" opacity="0.7"/>
          <circle cx="100" cy="116" r="11" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
          <circle cx="100" cy="116" r="14" stroke="currentColor" stroke-width="0.5" opacity="0.12"/>
          <line x1="88" y1="150" x2="112" y2="150" stroke="currentColor" stroke-width="2.5" opacity="0.45"/>
          <line x1="100" y1="82" x2="100" y2="34" stroke="currentColor" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
          <rect x="90" y="18" width="20" height="20" rx="4" stroke="currentColor" stroke-width="2.5" opacity="0.7"/>
          <circle cx="86" cy="23" r="2.5" stroke="currentColor" stroke-width="1.2" opacity="0.45"/>
          <circle cx="94" cy="20" r="2.5" stroke="currentColor" stroke-width="1.2" opacity="0.45"/>
          <circle cx="106" cy="20" r="2.5" stroke="currentColor" stroke-width="1.2" opacity="0.45"/>
          <circle cx="114" cy="23" r="2.5" stroke="currentColor" stroke-width="1.2" opacity="0.45"/>
          <line x1="84" y1="54" x2="116" y2="54" stroke="currentColor" stroke-width="1" opacity="0.18"/>
          <line x1="86" y1="65" x2="114" y2="65" stroke="currentColor" stroke-width="1" opacity="0.18"/>
          <line x1="88" y1="76" x2="112" y2="76" stroke="currentColor" stroke-width="1" opacity="0.18"/>
          <line x1="96" y1="44" x2="96" y2="78" stroke="currentColor" stroke-width="0.6" opacity="0.3"/>
          <line x1="98.7" y1="44" x2="98.7" y2="78" stroke="currentColor" stroke-width="0.6" opacity="0.3"/>
          <line x1="101.3" y1="44" x2="101.3" y2="78" stroke="currentColor" stroke-width="0.6" opacity="0.3"/>
          <line x1="104" y1="44" x2="104" y2="78" stroke="currentColor" stroke-width="0.6" opacity="0.3"/>
        </svg>
      </div>
    </div>
    <div class="scroll-hint" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <line x1="12" y1="5" x2="12" y2="19"/>
        <polyline points="7 14 12 19 17 14"/>
      </svg>
    </div>
  </section>

  <!-- ─── Main Content (scroll below hero) ─── -->
  <main class="site-main">
    <div class="container">

      <!-- Audio Player -->
      <section id="player-section" class="player-section" aria-label="Audio Player">
        <div class="player-card">
          <!-- Now playing info -->
          <div class="player-now-playing">
            <div class="player-cover">
              <img src="img/cover-placeholder.svg" alt="" class="cover-img" id="cover-img">
              <div class="equalizer-bars" id="eq-bars" aria-hidden="true">
                <span class="eq-bar"></span>
                <span class="eq-bar"></span>
                <span class="eq-bar"></span>
                <span class="eq-bar"></span>
                <span class="eq-bar"></span>
              </div>
            </div>
            <div class="player-track-info">
              <h3 class="track-title" id="track-title">—</h3>
              <p class="track-artist" id="track-artist">C.Sole</p>
            </div>
          </div>

          <!-- Progress bar -->
          <div class="player-progress">
            <span class="time-label" id="time-current">0:00</span>
            <input
              type="range"
              class="progress-bar"
              id="progress-bar"
              min="0"
              max="100"
              value="0"
              step="0.1"
              aria-label="Progress"
            >
            <span class="time-label" id="time-duration">0:00</span>
          </div>

          <!-- Controls -->
          <div class="player-controls">
            <button class="ctrl-btn ctrl-btn--small" id="btn-shuffle" title="Shuffle" aria-label="Shuffle">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 3 21 3 21 8"/>
                <line x1="4" y1="20" x2="21" y2="3"/>
                <polyline points="21 16 21 21 16 21"/>
                <line x1="15" y1="15" x2="21" y2="21"/>
                <line x1="4" y1="4" x2="9" y2="9"/>
              </svg>
            </button>

            <button class="ctrl-btn" id="btn-prev" title="Previous" aria-label="Previous">
              <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
              </svg>
            </button>

            <button class="ctrl-btn ctrl-btn--play" id="btn-play" title="Play" aria-label="Play">
              <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor" id="icon-play">
                <path d="M8 5v14l11-7z"/>
              </svg>
              <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor" id="icon-pause" style="display:none">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
              </svg>
            </button>

            <button class="ctrl-btn" id="btn-next" title="Next" aria-label="Next">
              <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                <path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6h-2z"/>
              </svg>
            </button>

            <button class="ctrl-btn ctrl-btn--small" id="btn-repeat" title="Repeat" aria-label="Repeat">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="17 1 21 5 17 9"/>
                <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                <polyline points="7 23 3 19 7 15"/>
                <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
              </svg>
              <span class="repeat-indicator" id="repeat-one" style="display:none">1</span>
            </button>
          </div>

          <!-- Volume -->
          <div class="player-volume">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="icon-volume">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14" id="vol-wave-1"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07" id="vol-wave-2"/>
            </svg>
            <input
              type="range"
              class="volume-slider"
              id="volume-slider"
              min="0"
              max="100"
              value="80"
              aria-label="Volume"
            >
          </div>
        </div>
      </section>

      <!-- Spectrum Visualizer -->
      <section class="visualizer-section" aria-label="Spectrum">
        <canvas id="spectrum-canvas" aria-hidden="true"></canvas>
      </section>

      <!-- Playlist -->
      <section class="playlist-section" aria-label="Playlist">
        <h2 class="section-heading">Playlist</h2>
        <ul class="playlist" id="playlist">
          <!-- Rendered by JS -->
        </ul>
      </section>

      <!-- Lyrics -->
      <section class="lyrics-section" aria-label="Lyrics">
        <h2 class="section-heading">Lyrics</h2>
        <div class="lyrics-container" id="lyrics-container">
          <!-- No saved lyrics yet -->
          <div class="lyrics-empty" id="lyrics-empty">
            <p class="lyrics-empty-text" id="lyrics-empty-text">Play a track and click <strong>Record Lyrics</strong> to auto-generate</p>
          </div>
          <!-- Saved/displayed lyrics -->
          <div class="lyrics-display" id="lyrics-display" style="display:none">
            <div class="lyrics-lines" id="lyrics-lines"></div>
          </div>
          <!-- Recording indicator -->
          <div class="lyrics-recording" id="lyrics-recording" style="display:none">
            <span class="rec-dot" aria-hidden="true"></span>
            <span class="rec-text">Recording — sing or speak the lyrics...</span>
            <p class="rec-live" id="rec-live"></p>
          </div>
        </div>
        <!-- Record button row -->
        <div class="lyrics-actions">
          <button class="lyrics-btn lyrics-btn--record" id="btn-record-lyrics" title="Record lyrics via microphone">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><circle cx="12" cy="12" r="6"/><path d="M12 18v4M8 22h8" stroke="currentColor" stroke-width="2" fill="none"/></svg>
            Record Lyrics
          </button>
          <button class="lyrics-btn lyrics-btn--clear" id="btn-clear-lyrics" title="Clear saved lyrics for this track" style="display:none">
            Clear
          </button>
        </div>
      </section>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="footer-text">© 2026 C.Sole</p>
    </div>
  </footer>

</body>
</html>
