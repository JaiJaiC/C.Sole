<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Dark background circle -->
  <circle cx="100" cy="100" r="100" fill="#1a1a1a"/>
  <!-- Subtle texture ring -->
  <circle cx="100" cy="100" r="90" stroke="#e8a850" stroke-width="0.5" opacity="0.15"/>
  <circle cx="100" cy="100" r="70" stroke="#e8a850" stroke-width="0.5" opacity="0.08"/>
  <!-- Guitar body -->
  <ellipse cx="100" cy="140" rx="42" ry="34" stroke="#e8a850" stroke-width="3" opacity="0.55"/>
  <ellipse cx="100" cy="108" rx="30" ry="24" stroke="#e8a850" stroke-width="3" opacity="0.55"/>
  <!-- Sound hole -->
  <circle cx="100" cy="118" r="12" stroke="#e8a850" stroke-width="2" opacity="0.3"/>
  <!-- Rosette -->
  <circle cx="100" cy="118" r="15" stroke="#e8a850" stroke-width="0.5" opacity="0.15"/>
  <!-- Bridge -->
  <line x1="88" y1="152" x2="112" y2="152" stroke="#e8a850" stroke-width="2" opacity="0.4"/>
  <!-- Neck -->
  <line x1="100" y1="84" x2="100" y2="35" stroke="#e8a850" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <!-- Headstock -->
  <rect x="90" y="20" width="20" height="20" rx="4" stroke="#e8a850" stroke-width="2.5" opacity="0.55"/>
  <!-- Tuning pegs -->
  <circle cx="87" cy="25" r="2" stroke="#e8a850" stroke-width="1" opacity="0.4"/>
  <circle cx="93" cy="22" r="2" stroke="#e8a850" stroke-width="1" opacity="0.4"/>
  <circle cx="107" cy="22" r="2" stroke="#e8a850" stroke-width="1" opacity="0.4"/>
  <circle cx="113" cy="25" r="2" stroke="#e8a850" stroke-width="1" opacity="0.4"/>
  <!-- Frets -->
  <line x1="85" y1="55" x2="115" y2="55" stroke="#e8a850" stroke-width="1" opacity="0.2"/>
  <line x1="87" y1="66" x2="113" y2="66" stroke="#e8a850" stroke-width="1" opacity="0.2"/>
  <line x1="89" y1="77" x2="111" y2="77" stroke="#e8a850" stroke-width="1" opacity="0.2"/>
  <!-- Strings -->
  <line x1="96" y1="45" x2="96" y2="82" stroke="#e8a850" stroke-width="0.7" opacity="0.3"/>
  <line x1="98.7" y1="45" x2="98.7" y2="82" stroke="#e8a850" stroke-width="0.7" opacity="0.3"/>
  <line x1="101.3" y1="45" x2="101.3" y2="82" stroke="#e8a850" stroke-width="0.7" opacity="0.3"/>
  <line x1="104" y1="45" x2="104" y2="82" stroke="#e8a850" stroke-width="0.7" opacity="0.3"/>
  <!-- Floating music notes -->
  <g opacity="0.3">
    <circle cx="150" cy="48" r="5" fill="#e8a850"/>
    <line x1="155" y1="48" x2="155" y2="24" stroke="#e8a850" stroke-width="2"/>
    <line x1="155" y1="24" x2="160" y2="28" stroke="#e8a850" stroke-width="1.5"/>
  </g>
  <g opacity="0.2">
    <circle cx="165" cy="35" r="4" fill="#e8a850"/>
    <line x1="169" y1="35" x2="169" y2="14" stroke="#e8a850" stroke-width="1.8"/>
  </g>
</svg>
