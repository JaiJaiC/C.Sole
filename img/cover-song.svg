<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Melodic teal gradient -->
  <defs>
    <radialGradient id="g3" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a3a38"/>
      <stop offset="100%" stop-color="#0a1615"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" rx="200" fill="url(#g3)"/>
  <!-- Sound wave arcs -->
  <g opacity="0.15" stroke="#70c8b8" fill="none" stroke-width="1.5">
    <path d="M70 55 Q100 35 130 55"/>
    <path d="M60 70 Q100 40 140 70"/>
    <path d="M55 85 Q100 45 145 85"/>
  </g>
  <!-- Floating notes -->
  <g opacity="0.25" fill="#70c8b8">
    <circle cx="45" cy="45" r="4"/>
    <line x1="49" y1="45" x2="49" y2="25" stroke="#70c8b8" stroke-width="1.8"/>
    <circle cx="160" cy="55" r="3.5"/>
    <line x1="163.5" y1="55" x2="163.5" y2="35" stroke="#70c8b8" stroke-width="1.8"/>
  </g>
  <!-- Guitar silhouette -->
  <g transform="translate(0,5)">
    <ellipse cx="100" cy="140" rx="36" ry="28" stroke="#7cc8b8" stroke-width="2.5" opacity="0.5"/>
    <ellipse cx="100" cy="112" rx="24" ry="20" stroke="#7cc8b8" stroke-width="2.5" opacity="0.5"/>
    <circle cx="100" cy="120" r="9" stroke="#7cc8b8" stroke-width="1.2" opacity="0.3"/>
    <line x1="100" y1="92" x2="100" y2="50" stroke="#7cc8b8" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <rect x="92" y="36" width="16" height="16" rx="3" stroke="#7cc8b8" stroke-width="2" opacity="0.5"/>
  </g>
</svg>
